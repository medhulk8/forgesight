# QLoRA SFT hyperparameters (§9). Consumed by train_sft.py → TRL SFTConfig.
output_dir: /kaggle/working/adapters/sft
per_device_train_batch_size: 1
gradient_accumulation_steps: 8          # effective batch 8 (per GPU)
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
num_train_epochs: 3                     # 1 epoch collapsed to always-"clean" (underfit
                                        # positive class); 3 epochs to actually learn boxes
bf16: false                             # T4 = Turing: NO bf16 tensor cores
fp16: true                              # fp16 uses T4 tensor cores -> much faster
gradient_checkpointing: true            # essential for T4 VRAM
logging_steps: 10
eval_strategy: "no"                     # in-loop eval batched 8 val imgs -> vision-tower OOM;
                                        # judge on train loss + ForgeBench (test) instead
eval_steps: 100                         # unused while eval_strategy="no" (kept for build_trainer)
save_strategy: epoch                    # save adapter at each epoch end
save_steps: 100                         # unused while save_strategy="epoch" (kept for build_trainer)
save_total_limit: 2
report_to: none
max_grad_norm: 0.3
optim: paged_adamw_8bit                 # bnb paged optimizer -> fits T4

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# data
data_root: /kaggle/input/forgesight-data
max_length: 2048
