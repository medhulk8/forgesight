# ForgeSight dataset build config (§5, §13 step 5).

seed: 0
sources: [sroie, funsd]
limit_per_source: null          # null = all docs

# per base doc: always 1 clean + up to N distinct-op tampered variants
n_tampered_variants: 2

# doc-level split (all variants of a base doc stay in ONE split — no leakage)
split_ratios:
  train: 0.70
  val: 0.15
  test: 0.15

# 50/50 clean:tampered — TRAIN ONLY, via oversampling clean rows.
# val/test keep the natural distribution (duplicating eval rows would bias ForgeBench).
balance_train_5050: true

# splice donors harvested per (split, source) so a splice never pastes a crop
# from a doc in another split (subtle pixel leakage otherwise).
donor_pool_per_split: true

# Images saved as downscaled JPEG. Full-res lossless PNG produced a 2.1 GB dump
# that would not upload to Kaggle over a flaky link. box_pixel/width/height stay in
# ORIGINAL pixel space and the target box is a 0..1000 normalised string
# (resolution-independent), so shrinking the stored pixels does NOT affect the
# coordinate math or eval IoU — and Qwen2-VL downscales to ~max_pixels on load
# anyway, so full-res was wasted bytes. Uniform format also avoids any format shortcut.
image_format: jpg
max_image_side: 1024        # cap the longest side (px) before saving
jpeg_quality: 90

out_dir: data/processed
